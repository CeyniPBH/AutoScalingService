syntax = "proto3";

service MonitorService {

  rpc Ping(Empty) returns (Pong);

  rpc GetMetrics(Empty) returns (MetricsResponse);

}

message Empty {}

message Pong {
  string message = 1;
}

message MetricsResponse {

  string status = 1;

  double cpu_percent = 2;

  double ram_percent = 3;

  double load_percent = 4;

  double effective_load_percent = 5;

  int32 active_requests = 6;

  double timestamp = 8;
}